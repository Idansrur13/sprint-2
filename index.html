<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עידן מימס</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/main.css">
</head>

<body onload="oninit()">

    <header>
        <h1>ברוכים הבאים</h1>
        <nav>

            <a href="#" onclick="closeEditor()">גלריה</a>

            <a href="#" onclick="setSevedImgs()">שמורים</a>

        </nav>

        <div>

            <div class="common-serch">
                <i class="fa-solid fa-search"></i>
            </div>
            <input type="text" onchange="setFilter(this.value)">
        </div>

    </header>


    <main>
        <section>
            <div class="header-editor">
                <h2> זה הזמן ליצור את המים הבא</h2>
                <button class="back-button" onclick="closeEditor()"><i class="fa-solid fa-angle-left"></i>
                </button>
            </div>

            <div class="editor">
                <div class="editor-div">
                    <canvas class="main-canvas"></canvas>
                    <div class="action-editor">


                        <div class="cover-svg">
                            <div class="select-svg">

                            </div>

                        </div>

                        <div class="editor-settings">

                            <input class="inputText" value="הקלד כאן" oninput="changeText(this.value)" />

                            <button class="button-img" onclick="setPlusLine()"><i class="fa-solid fa-plus"></i></button>

                            <button class="button-img" onclick="setMinusLine()"><i
                                    class="fa-solid fa-delete-left"></i></button>


                            <button class="button-img" onclick="setPrevLine()"> <i
                                    class="fa-solid fa-forward"></i></button>
                            <button class=" button-img" onclick="setNextLine()"><i class="fa-solid fa-backward"></i>
                            </button>

                            <input type='color' onchange="changeColorText(this.value)" />

                            <button class=" button-img" onclick="downloadMeme()"><i class="fa-solid fa-download"></i>
                            </button>
                            <button class="button-img" onclick="saveMemeToDb()"><i
                                    class="fa-solid fa-save"></i></button>

                            <div class="Input-range">
                                <p>5</p>
                                <input type="range" max="60" min="4" value="30" onchange="changeSizeText(this.value)">
                                <p>60</p>
                            </div>

                            <div class="controller-text">
                                <button class="button-img" onclick="setGoTextUp()"><i
                                        class="fa-solid fa-angle-up"></i></button>
                                <div>
                                    <button class="button-img" onclick="setGoTextRight()"><i
                                            class="fa-solid fa-angle-right"></i></button>
                                    <button class="button-img" onclick="setTextBold()"><i
                                            class="fa-solid fa-bold"></i></button>
                                    <button class="button-img" onclick="setGoTextLeft()"><i
                                            class="fa-solid fa-angle-left"></i></button>
                                </div>

                                <button class="button-img" onclick="setGoTextDown()"><i
                                        class="fa-solid fa-angle-down"></i></button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
            <div class="galery"></div>

            <div class="saved-section" style="display:none">
                <h2>ממים שמורים</h2>
                <div class="saved-grid"></div>
            </div>

            <div class="backdrop-modal" onclick="closeModal()">
                <div class="modal">
                    <img src="" alt="" class="imgShow">
                </div>
            </div>
        </section>
    </main>

    <footer>
    </footer>

    <script src="js/service.js"></script>
    <script src="js/main.js"></script>
    <script src="js/editor.js"></script>
</body>

</html>
